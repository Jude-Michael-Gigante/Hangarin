<!DOCTYPE html>
<html>
<head>
    <title>Task Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Hangarin</a>
</nav>
<div class="container mt-4" style="max-width:600px">
    <h2>{% if task %}Edit{% else %}Add{% endif %} Task</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control">{{ task.description }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Deadline</label>
            <input type="datetime-local" name="deadline" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
                <option value="Pending" {% if task.status == "Pending" %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if task.status == "Completed" %}selected{% endif %}>Completed</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-control">
                {% for category in categories %}
                <option value="{{ category.pk }}" {% if task.category.pk == category.pk %}selected{% endif %}>{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-control">
                {% for priority in priorities %}
                <option value="{{ priority.pk }}" {% if task.priority.pk == priority.pk %}selected{% endif %}>{{ priority.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/tasks/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
