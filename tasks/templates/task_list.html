<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Hangarin</a>
    <div>
        <a href="/tasks/" class="btn btn-outline-light me-2">Tasks</a>
        <a href="/categories/" class="btn btn-outline-light me-2">Categories</a>
        <a href="/priorities/" class="btn btn-outline-light">Priorities</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Tasks</h2>
        <a href="/tasks/add/" class="btn btn-primary">+ Add Task</a>
    </div>
    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr><th>Title</th><th>Status</th><th>Deadline</th><th>Category</th><th>Priority</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.title }}</td>
                <td>{{ task.status }}</td>
                <td>{{ task.deadline }}</td>
                <td>{{ task.category }}</td>
                <td>{{ task.priority }}</td>
                <td>
                    <a href="/tasks/edit/{{ task.pk }}/" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/tasks/delete/{{ task.pk }}/" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6">No tasks yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
