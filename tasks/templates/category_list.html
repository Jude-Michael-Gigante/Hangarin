<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Hangarin</a>
    <div>
        <a href="/tasks/" class="btn btn-outline-light me-2">Tasks</a>
        <a href="/categories/" class="btn btn-outline-light me-2">Categories</a>
        <a href="/priorities/" class="btn btn-outline-light">Priorities</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Categories</h2>
        <a href="/categories/add/" class="btn btn-primary">+ Add Category</a>
    </div>
    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr><th>Name</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>
                    <a href="/categories/edit/{{ category.pk }}/" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/categories/delete/{{ category.pk }}/" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="2">No categories yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
